<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Legends of the Infinite Sea - An Interactive Storybook Adventure">
    <meta name="theme-color" content="#0a0e27">
    <title>Legends of the Infinite Sea</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%230ea5e9'>⚓</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #0ea5e9;
            --secondary-color: #1e293b;
            --accent-color: #f97316;
            --text-light: #e2e8f0;
            --text-dark: #1e293b;
            --bg-dark: #0a0e27;
            --bg-light: #f8fafc;
            --border-color: #334155;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: var(--text-light);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #root {
            width: 100%;
            height: 100%;
        }

        /* Global Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 5px rgba(14, 165, 233, 0.3);
            }
            50% {
                text-shadow: 0 0 20px rgba(14, 165, 233, 0.6);
            }
        }

        @keyframes pageFlip {
            0% {
                transform: rotateY(0deg);
            }
            100% {
                transform: rotateY(180deg);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            z-index: 9999;
            animation: fadeIn 0.5s ease-out;
        }

        .loading-content {
            text-align: center;
        }

        .loading-icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        .loading-text {
            font-size: 20px;
            color: var(--primary-color);
            animation: glow 2s ease-in-out infinite;
            margin-bottom: 10px;
        }

        .loading-bar {
            width: 200px;
            height: 4px;
            background: rgba(14, 165, 233, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 20px;
        }

        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            animation: slideIn 2s ease-in-out infinite;
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-weight: 700;
            line-height: 1.2;
        }

        h1 {
            font-size: 3.5rem;
            color: var(--primary-color);
        }

        h2 {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        h3 {
            font-size: 1.8rem;
            color: var(--primary-color);
            margin-bottom: 0.8rem;
        }

        p {
            line-height: 1.8;
            font-size: 1rem;
            color: var(--text-light);
        }

        /* Buttons */
        button {
            cursor: pointer;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            transition: left 0.3s ease;
        }

        button:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), #0284c7);
            color: white;
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.6);
        }

        .btn-secondary {
            background: var(--secondary-color);
            color: var(--text-light);
            border: 2px solid var(--border-color);
        }

        .btn-secondary:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        .btn-accent {
            background: linear-gradient(135deg, var(--accent-color), #ea580c);
            color: white;
        }

        .btn-accent:hover {
            transform: scale(1.05);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 0.875rem;
        }

        .btn-lg {
            padding: 16px 32px;
            font-size: 1.125rem;
        }

        /* Cards */
        .card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(14, 165, 233, 0.2);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--primary-color);
            box-shadow: 0 8px 32px rgba(14, 165, 233, 0.15);
            transform: translateY(-4px);
        }

        /* Grid */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            gap: 24px;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        }

        /* Input Fields */
        input, textarea, select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-light);
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(14, 165, 233, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #0284c7;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            h2 {
                font-size: 1.75rem;
            }

            h3 {
                font-size: 1.25rem;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px 24px;
            color: var(--text-light);
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
            max-width: 400px;
        }

        .toast.success {
            border-left: 4px solid var(--success);
        }

        .toast.error {
            border-left: 4px solid var(--danger);
        }

        .toast.warning {
            border-left: 4px solid var(--warning);
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Visibility */
        .invisible {
            visibility: hidden;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        // App Shell
        const app = {
            currentScreen: 'loading',
            darkMode: localStorage.getItem('darkMode') !== 'false',
            soundEnabled: localStorage.getItem('soundEnabled') !== 'false',
            musicEnabled: localStorage.getItem('musicEnabled') !== 'false',
            currentChapter: parseInt(localStorage.getItem('currentChapter') || '0'),
            currentPage: parseInt(localStorage.getItem('currentPage') || '0'),
            crew: JSON.parse(localStorage.getItem('crew') || '[]'),
            inventory: JSON.parse(localStorage.getItem('inventory') || '[]'),
            achievements: JSON.parse(localStorage.getItem('achievements') || '[]'),

            init() {
                this.setupDOM();
                this.setupListeners();
                this.loadTheme();
                setTimeout(() => this.showHome(), 1500);
            },

            setupDOM() {
                const root = document.getElementById('root');
                root.innerHTML = `
                    <div class="loading-screen">
                        <div class="loading-content">
                            <div class="loading-icon">⚓</div>
                            <div class="loading-text">Legends of the Infinite Sea</div>
                            <div class="loading-bar">
                                <div class="loading-progress"></div>
                            </div>
                        </div>
                    </div>
                `;
            },

            setupListeners() {
                document.addEventListener('keydown', (e) => this.handleKeydown(e));
                document.addEventListener('touchstart', (e) => this.handleTouchstart(e));
            },

            loadTheme() {
                if (this.darkMode) {
                    document.body.style.background = 'linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%)';
                } else {
                    document.body.style.background = 'linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%)';
                }
            },

            showHome() {
                this.currentScreen = 'home';
                const root = document.getElementById('root');
                root.innerHTML = this.renderHome();
                this.attachHomeListeners();
            },

            renderHome() {
                const hasProgress = this.currentChapter > 0;
                return `
                    <div class="home-screen" style="
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        justify-content: center;
                        overflow: auto;
                        padding: 20px;
                        text-align: center;
                    ">
                        <style>
                            .home-screen {
                                background: linear-gradient(135deg, rgba(10, 14, 39, 0.8), rgba(26, 31, 58, 0.8));
                                backdrop-filter: blur(10px);
                            }

                            .home-title {
                                font-size: 3.5rem;
                                font-weight: 900;
                                color: var(--primary-color);
                                margin-bottom: 10px;
                                text-shadow: 0 0 30px rgba(14, 165, 233, 0.5);
                                animation: float 3s ease-in-out infinite;
                            }

                            .home-subtitle {
                                font-size: 1.25rem;
                                color: var(--accent-color);
                                margin-bottom: 40px;
                                letter-spacing: 2px;
                            }

                            .home-nav {
                                display: flex;
                                flex-wrap: wrap;
                                gap: 12px;
                                justify-content: center;
                                margin-bottom: 30px;
                                max-width: 900px;
                            }

                            .home-nav button {
                                flex: 1;
                                min-width: 150px;
                                min-height: 60px;
                                font-size: 1rem;
                                animation: slideIn 0.5s ease-out;
                            }

                            .home-nav button:nth-child(1) { animation-delay: 0.1s; }
                            .home-nav button:nth-child(2) { animation-delay: 0.2s; }
                            .home-nav button:nth-child(3) { animation-delay: 0.3s; }
                            .home-nav button:nth-child(4) { animation-delay: 0.4s; }
                            .home-nav button:nth-child(5) { animation-delay: 0.5s; }
                        </style>

                        <div style="margin-bottom: 60px;">
                            <div class="home-title">⚓ LEGENDS</div>
                            <div class="home-title" style="font-size: 2.5rem; margin-top: -10px;">OF THE INFINITE SEA</div>
                            <div class="home-subtitle">An Epic Interactive Adventure</div>
                        </div>

                        <div class="home-nav">
                            <button class="btn-primary btn-lg" onclick="app.startAdventure()">
                                🌊 ${hasProgress ? 'Continue' : 'Start'} Adventure
                            </button>
                            <button class="btn-secondary btn-lg" onclick="app.showChapters()">
                                📖 Chapters
                            </button>
                            <button class="btn-secondary btn-lg" onclick="app.showCharacters()">
                                👥 Characters
                            </button>
                            <button class="btn-secondary btn-lg" onclick="app.showAtlas()">
                                🗺️ World Atlas
                            </button>
                            <button class="btn-secondary btn-lg" onclick="app.showEncyclopedia()">
                                📚 Encyclopedia
                            </button>
                            <button class="btn-secondary btn-lg" onclick="app.showAchievements()">
                                🏆 Achievements
                            </button>
                            <button class="btn-secondary btn-lg" onclick="app.showSettings()">
                                ⚙️ Settings
                            </button>
                        </div>

                        <div style="
                            margin-top: 40px;
                            padding: 20px;
                            background: rgba(14, 165, 233, 0.1);
                            border: 1px solid rgba(14, 165, 233, 0.2);
                            border-radius: 8px;
                            max-width: 600px;
                        ">
                            <h3>Welcome, Explorer</h3>
                            <p style="margin-top: 10px;">
                                Dive into a world of mystery, adventure, and discovery. Follow an unlikely crew
                                as they search for The Eternal Horizon—a legendary treasure that could unite every sea.
                            </p>
                        </div>
                    </div>
                `;
            },

            attachHomeListeners() {
                // Listeners already attached via onclick attributes
            },

            startAdventure() {
                if (this.currentChapter === 0) {
                    this.showChapter(0);
                } else {
                    this.showChapter(this.currentChapter);
                }
            },

            showChapters() {
                this.currentScreen = 'chapters';
                const root = document.getElementById('root');
                root.innerHTML = `
                    <div style="
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;
                        display: flex;
                        flex-direction: column;
                        background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
                        overflow: auto;
                        padding: 40px 20px;
                    ">
                        <div class="container">
                            <button class="btn-secondary btn-sm" onclick="app.showHome()">← Back</button>
                            <h1 style="margin: 30px 0; text-align: center;">📖 Chapters</h1>

                            <div class="grid">
                                ${this.getChapters().map((ch, i) => `
                                    <div class="card" style="cursor: pointer; ${i <= this.currentChapter ? '' : 'opacity: 0.5; pointer-events: none;'}">
                                        <h3>Chapter ${ch.number}</h3>
                                        <p style="font-size: 0.9rem; margin: 10px 0; color: var(--accent-color);">${ch.title}</p>
                                        <p style="font-size: 0.85rem; line-height: 1.6;">${ch.description}</p>
                                        <button class="btn-primary btn-sm" style="margin-top: 15px; width: 100%;" onclick="app.showChapter(${i})">
                                            ${i < this.currentChapter ? '✓ Read' : i === this.currentChapter ? 'Continue' : 'Locked'}
                                        </button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            },

            showCharacters() {
                this.currentScreen = 'characters';
                const root = document.getElementById('root');
                root.innerHTML = `
                    <div style="
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;
                        display: flex;
                        flex-direction: column;
                        background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
                        overflow: auto;
                        padding: 40px 20px;
                    ">
                        <div class="container">
                            <button class="btn-secondary btn-sm" onclick="app.showHome()">← Back</button>
                            <h1 style="margin: 30px 0; text-align: center;">👥 Character Database</h1>

                            <div class="grid">
                                ${this.getCharacters().map(ch => `
                                    <div class="card">
                                        <div style="font-size: 2rem; margin-bottom: 10px;">${ch.icon}</div>
                                        <h3>${ch.name}</h3>
                                        <p style="font-size: 0.9rem; color: var(--accent-color); margin-bottom: 10px;">${ch.title}</p>
                                        <p style="font-size: 0.85rem; line-height: 1.6; margin-bottom: 15px;">${ch.description}</p>
                                        <div style="font-size: 0.85rem; color: var(--primary-color);">
                                            <strong>Ability:</strong> ${ch.ability}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            },

            showAtlas() {
                this.currentScreen = 'atlas';
                const root = document.getElementById('root');
                root.innerHTML = `
                    <div style="
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;
                        display: flex;
                        flex-direction: column;
                        background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
                        overflow: auto;
                        padding: 40px 20px;
                    ">
                        <div class="container">
                            <button class="btn-secondary btn-sm" onclick="app.showHome()">← Back</button>
                            <h1 style="margin: 30px 0; text-align: center;">🗺️ World Atlas</h1>

                            <div class="grid">
                                ${this.getIslands().map(island => `
                                    <div class="card">
                                        <div style="font-size: 2rem; margin-bottom: 10px;">${island.icon}</div>
                                        <h3>${island.name}</h3>
                                        <p style="font-size: 0.9rem; color: var(--accent-color); margin-bottom: 10px;">${island.type}</p>
                                        <p style="font-size: 0.85rem; line-height: 1.6;">${island.description}</p>
                                        <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border-color); font-size: 0.8rem;">
                                            <strong>Population:</strong> ${island.population}<br>
                                            <strong>Culture:</strong> ${island.culture}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            },

            showEncyclopedia() {
                this.currentScreen = 'encyclopedia';
                const root = document.getElementById('root');
                root.innerHTML = `
                    <div style="
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;
                        display: flex;
                        flex-direction: column;
                        background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
                        overflow: auto;
                        padding: 40px 20px;
                    ">
                        <div class="container">
                            <button class="btn-secondary btn-sm" onclick="app.showHome()">← Back</button>
                            <h1 style="margin: 30px 0; text-align: center;">📚 Encyclopedia</h1>

                            <div style="margin-bottom: 30px;">
                                <h2>⚡ Power System - Elemental Relics</h2>
                                <div class="grid">
                                    ${this.getPowers().map(power => `
                                        <div class="card">
                                            <h3 style="margin-bottom: 10px;">${power.name}</h3>
                                            <p style="font-size: 0.9rem; margin-bottom: 10px; color: var(--accent-color);">${power.description}</p>
                                            <div style="font-size: 0.85rem; line-height: 1.8;">
                                                <strong>Strengths:</strong> ${power.strengths}<br>
                                                <strong>Weaknesses:</strong> ${power.weaknesses}
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>

                            <div>
                                <h2>🎁 Legendary Artifacts</h2>
                                <div class="grid">
                                    ${this.getArtifacts().map(artifact => `
                                        <div class="card">
                                            <h3 style="margin-bottom: 10px;">${artifact.name}</h3>
                                            <p style="font-size: 0.9rem; margin-bottom: 10px; color: var(--accent-color);">${artifact.description}</p>
                                            <div style="font-size: 0.85rem;">
                                                <strong>Effect:</strong> ${artifact.effect}
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            showAchievements() {
                this.currentScreen = 'achievements';
                const achievementsList = this.getAchievements();
                const root = document.getElementById('root');
                root.innerHTML = `
                    <div style="
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;
                        display: flex;
                        flex-direction: column;
                        background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
                        overflow: auto;
                        padding: 40px 20px;
                    ">
                        <div class="container">
                            <button class="btn-secondary btn-sm" onclick="app.showHome()">← Back</button>
                            <h1 style="margin: 30px 0; text-align: center;">🏆 Achievements</h1>

                            <div style="margin-bottom: 30px; padding: 20px; background: rgba(14, 165, 233, 0.1); border-radius: 8px; text-align: center;">
                                <h3>Total Achievements: ${this.achievements.length}/${achievementsList.length}</h3>
                            </div>

                            <div class="grid">
                                ${achievementsList.map(ach => {
                                    const unlocked = this.achievements.includes(ach.id);
                                    return `
                                        <div class="card" style="opacity: ${unlocked ? '1' : '0.6'}; ${unlocked ? 'border-color: var(--primary-color);' : ''}">
                                            <div style="font-size: 2rem; margin-bottom: 10px;">${ach.icon}</div>
                                            <h3>${ach.title}</h3>
                                            <p style="font-size: 0.9rem; margin-bottom: 10px;">${ach.description}</p>
                                            <div style="font-size: 0.8rem; color: var(--accent-color);">
                                                ${unlocked ? '✓ UNLOCKED' : 'LOCKED'}
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                `;
            },

            showSettings() {
                this.currentScreen = 'settings';
                const root = document.getElementById('root');
                root.innerHTML = `
                    <div style="
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;
                        display: flex;
                        flex-direction: column;
                        background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
                        overflow: auto;
                        padding: 40px 20px;
                    ">
                        <div class="container" style="max-width: 600px;">
                            <button class="btn-secondary btn-sm" onclick="app.showHome()">← Back</button>
                            <h1 style="margin: 30px 0; text-align: center;">⚙️ Settings</h1>

                            <div class="card" style="margin-bottom: 20px;">
                                <h3 style="margin-bottom: 20px;">Display</h3>
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                                    <label>🌙 Dark Mode</label>

            nextChapter() {

            makeChoice(chapterIndex, choiceIndex) {
                const chapter = this.getChapters()[chapterIndex];
                const choice = chapter.choices[choiceIndex];

                if (choice.unlockAchievement) {
                    if (!this.achievements.includes(choice.unlockAchievement)) {
                        this.achievements.push(choice.unlockAchievement);
                        localStorage.setItem('achievements', JSON.stringify(this.achievements));
                        this.showToast(`🏆 Achievement Unlocked: ${choice.unlockAchievement}`, 'success');
                    }
                }

                if (choice.nextChapter !== undefined) {
                    this.showChapter(choice.nextChapter);
                } else {
                    this.nextChapter();
                }
            },

            toggleDarkMode() {
                this.darkMode = !this.darkMode;
                localStorage.setItem('darkMode', this.darkMode);
                this.loadTheme();
            },

            toggleSound() {
                this.soundEnabled = !this.soundEnabled;
                localStorage.setItem('soundEnabled', this.soundEnabled);
            },

            toggleMusic() {
                this.musicEnabled = !this.musicEnabled;
                localStorage.setItem('musicEnabled', this.musicEnabled);

            exportData() {
                const data = {
                    currentChapter: this.currentChapter,
                    crew: this.crew,
                    inventory: this.inventory,
                    achievements: this.achievements,
                    timestamp: new Date().toISOString()
                };
                const json = JSON.stringify(data, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `legends-save-${Date.now()}.json`;
                a.click();
                this.showToast('Save exported successfully!', 'success');
            },

            importData() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const data = JSON.parse(event.target.result);
                            this.currentChapter = data.currentChapter;
                            this.crew = data.crew;
                            this.inventory = data.inventory;
                            this.achievements = data.achievements;
                            localStorage.setItem('currentChapter', this.currentChapter);
                            localStorage.setItem('crew', JSON.stringify(this.crew));
                            localStorage.setItem('inventory', JSON.stringify(this.inventory));
                            localStorage.setItem('achievements', JSON.stringify(this.achievements));
                            this.showToast('Save imported successfully!', 'success');
                            this.showHome();
                        } catch (err) {
                            this.showToast('Failed to import save file', 'error');
                        }
                    };
                    reader.readAsText(file);
                };
                input.click();
            },

            resetData() {
                if (confirm('Are you sure? This will reset all your progress!')) {
                    this.currentChapter = 0;
                    this.crew = [];
                    this.inventory = [];
                    this.achievements = [];
                    localStorage.clear();
                    this.showToast('Game reset successfully', 'success');
                    this.showHome();
                }
            },
